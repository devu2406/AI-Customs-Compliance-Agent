<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>Login</h1>

        <input
            type="email"
            id="loginEmail"
            placeholder="Email">

        <input
            type="password"
            id="loginPassword"
            placeholder="Password">

        <button onclick="login()">
            Login
        </button>

        <p>
            Don't have an account?
            <a href="./register.html">
                Register
            </a>
        </p>

    </div>

</div>

<script src="../script.js"></script>

</body>
</html>
<button onclick="logout()">
    Logout
</button>
